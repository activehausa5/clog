name: Ultimate  Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Mutate
      run: python mutate.py
    - name: Build
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        rc.exe resources.rc
        cl.exe /O2 /MT /EHsc /DNDEBUG main.cpp resources.res /link /SUBSYSTEM:WINDOWS /OUT:sysupdate.exe user32.lib kernel32.lib winhttp.lib advapi32.lib
    - uses: actions/upload-artifact@v4
      with:
        name: hardened-binary
        path: sysupdate.exe
