name: Manual Research Build
on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Compile with MSVC
      shell: cmd
      run: |
        :: 1. Initialize the x64 Developer Environment
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"

        :: 2. Assemble the MASM file (ml64.exe)
        ml64.exe /c syscalls.asm

        :: 3. Compile the C++ file (cl.exe)
        :: /MT = Static Link, /O2 = Optimize, /DNDEBUG = Release mode
        cl.exe /O2 /MT /DNDEBUG main.cpp syscalls.obj /link /SUBSYSTEM:WINDOWS /OUT:clog.exe user32.lib kernel32.lib winhttp.lib advapi32.lib

    - name: Upload Compiled EXE
      uses: actions/upload-artifact@v4
      with:
        name: clog-binary
        path: clog.exe
