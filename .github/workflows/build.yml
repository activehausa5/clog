- name: Build
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        
        :: 1. Compile Resources (Now without the manifest line)
        rc.exe resources.rc
        
        :: 2. Assemble Syscalls
        ml64.exe /c syscalls.asm
        
        :: 3. Compile and Link
        :: We keep /MANIFEST:EMBED and /MANIFESTINPUT here.
        cl.exe /O2 /MT /EHsc /DNDEBUG ^
        main.cpp syscalls.obj resources.res ^
        /link /SUBSYSTEM:WINDOWS ^
        /MANIFEST:EMBED ^
        /MANIFESTINPUT:app.manifest ^
        /OUT:sysupdate.exe ^
        user32.lib kernel32.lib winhttp.lib advapi32.lib psapi.lib shell32.lib
